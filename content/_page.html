{% extends "_base.html" %}

{% block content %}
<div class="page-layout">
    <main class="page-main">
        <nav class="breadcrumb" aria-label="Breadcrumb">
            {% block breadcrumb %}
                <a href="/index.html">Home</a>
            {% endblock breadcrumb %}
        </nav>

        {% if draft %}
        <div class="draft-banner">
            <i class="fa-solid fa-pen-ruler"></i>
            <a href="/wip.html">Work in progress</a>
        </div>
        {% endif %}

        <article>
            <h1 class="page-title">{% block title %}{% endblock title %}</h1>
            <div class="content {% if draft %}draft-watermark{% endif %}">
                {% block page %}{% endblock page %}
            </div>
        </article>
    </main>
    <aside class="page-toc" id="toc" aria-label="Table of contents"></aside>
</div>
{% endblock content %}
