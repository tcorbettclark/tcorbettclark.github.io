{% if MY_PROJECTS %}
    <section class="cv-section">
        <h2><i class="fa fa-archive"></i> Projects</h2>
        <p>{{ MY_PROJECT_INTRO }}</p>
        {% for project in MY_PROJECTS %}
        <div class="cv-item">
            <span class="cv-title"><a href="#hook">{{ project['title'] }}</a></span> — <span>{{ project['tagline'] }}</span>
        </div>
        {% endfor %}
    </section>
{% endif %}
