{% if MY_EXPERIENCE %}
    <section class="cv-section">
        <h2><i class="fa fa-briefcase"></i> Experience</h2>
        {% for experience in MY_EXPERIENCE %}
        <div class="cv-item">
            <div class="cv-meta">
                <div class="cv-title">{{ experience['job_title'] }}</div>
                <div class="cv-time">{{ experience['time'] }}</div>
            </div>
            <div class="cv-company">{{ experience['company'] }}</div>
            <div class="cv-details">
                <p>{{ experience['details'] }}</p>
            </div>
        </div>
        {% endfor %}
    </section>
{% endif %}
